# Docker DNS resolver
resolver 127.0.0.11:53 valid=10s;
resolver_timeout 5s;

# Define upstream servers with DNS resolution
upstream backend_server {
    server backend:8000;
}

upstream frontend_server {
    server frontend:3000;
}

server {
    listen 127.0.0.1:80;
    listen 127.0.0.1:3000;
    server_name localhost 127.0.0.1;

    client_max_body_size 10M;
    client_body_timeout 60s;
    client_header_timeout 60s;

    location /staticfiles/ {
        alias /staticfiles/;
    }

    location /swagger {
        proxy_pass http://backend_server;
        proxy_cookie_path / /;
    }

    location /schema {
        proxy_pass http://backend_server;
        proxy_cookie_path / /;
    }


    location /admin {
        proxy_pass http://backend_server;
        proxy_cookie_path / /;
    }

    location /api {
        proxy_pass http://backend_server;
        proxy_cookie_path / /;
        }

    location /media {
        proxy_pass http://backend_server;
        proxy_cookie_path / /;
    }

    location / {
        proxy_pass http://frontend_server;
        proxy_cookie_path / /;
    }
}